title: MusicPro
views:
  - title: Routine
    path: routine
    icon: mdi:play-circle
    cards:
      - type: markdown
        content: |
          **Routine rapide** — equivalenti alle scene Alexa.
          Tocca un pulsante o usa *"Alexa, accendi MusicPro Attiva"* (dopo setup Hue).
      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: MusicPro Attiva
            icon: mdi:power-on
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.musicpro_attiva
          - type: button
            name: MusicPro Disattiva
            icon: mdi:power-off
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.musicpro_disattiva
          - type: button
            name: Casa Attiva
            icon: mdi:home
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.casa_attiva
          - type: button
            name: Casa Disattiva
            icon: mdi:home-off
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.casa_disattiva
          - type: button
            name: Stereo Radio
            icon: mdi:radio
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.stereo_su_radio
          - type: button
            name: Stereo TV
            icon: mdi:television
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.stereo_su_televisione
          - type: button
            name: Radio
            icon: mdi:radio-fm
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.radio
          - type: button
            name: Televisione
            icon: mdi:television-classic
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.televisione
          - type: button
            name: Stufa On
            icon: mdi:radiator
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.stufa
          - type: button
            name: Stufa Off
            icon: mdi:radiator-off
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.stufa_spenta
          - type: button
            name: Finestra Blu Apri
            icon: mdi:window-open
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.finestra_blu_apri
          - type: button
            name: Finestra Blu Chiudi
            icon: mdi:window-closed
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.finestra_blu_chiudi

