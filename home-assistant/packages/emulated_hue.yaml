# Emulated Hue — espone entità ad Alexa come bridge Philips Hue (LAN)
# Bridge: http://192.168.1.12:8300
# Setup Alexa: app → + → Philips Hue → **Hub** → Bridge V1 (rotondo)
# NON usare la skill Philips Hue (Skill e giochi) — serve account cloud reale

emulated_hue:
  listen_port: 8300
  advertise_port: 80
  host_ip: 0.0.0.0
  advertise_ip: 192.168.1.12
  upnp_bind_multicast: false
  expose_by_default: false
  entities:
    # --- NAS ---
    switch.accendi_nas:
      name: Accendi NAS
      hidden: false
    switch.spegni_nas:
      name: Spegni NAS
      hidden: false
    switch.riavvia_nas:
      name: Riavvia NAS
      hidden: false

